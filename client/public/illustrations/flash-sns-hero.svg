<svg width="760" height="440" viewBox="0 0 760 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blurLg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
    <filter id="blurSm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#334155" flood-opacity="0.08" />
    </filter>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f7f9" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="440" fill="#f6f7f9" rx="16" />

  <!-- Ambient glowing orbs -->
  <circle cx="200" cy="150" r="140" fill="#e8cfc4" opacity="0.4" filter="url(#blurLg)" />
  <circle cx="560" cy="290" r="160" fill="#7fa9c9" opacity="0.3" filter="url(#blurLg)" />
  <circle cx="480" cy="100" r="90" fill="#b7a7c9" opacity="0.2" filter="url(#blurSm)" />

  <!-- UI Mockup: Chat Window -->
  <g filter="url(#shadow)">
    <rect x="180" y="60" width="400" height="320" rx="32" fill="url(#cardGrad)" stroke="#ffffff" stroke-width="2" />
    <!-- Header -->
    <rect x="340" y="84" width="80" height="6" rx="3" fill="#edeeef" />
    
    <!-- Timer chip in header -->
    <rect x="320" y="104" width="120" height="32" rx="16" fill="#f6f7f9" stroke="#edeeef" stroke-width="1" />
    <!-- Clock icon -->
    <circle cx="340" cy="120" r="6" stroke="#334155" stroke-width="1.5" />
    <path d="M340 116v4l2.5 2.5" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="354" y="124" fill="#334155" font-family="'Inter', sans-serif" font-size="12" font-weight="600">23:59:59</text>

    <!-- Chat Bubbles -->
    <!-- Left Bubble -->
    <g transform="translate(220, 160)">
      <circle cx="16" cy="32" r="16" fill="#e8cfc4" />
      <path d="M44 14 Q44 0 58 0 H180 Q194 0 194 14 V34 Q194 48 180 48 H58 Q44 48 44 34 Z" fill="#f6f7f9" />
      <rect x="60" y="16" width="100" height="6" rx="3" fill="#334155" opacity="0.15" />
      <rect x="60" y="28" width="60" height="6" rx="3" fill="#334155" opacity="0.1" />
    </g>

    <!-- Right Bubble -->
    <g transform="translate(200, 230)">
      <path d="M140 14 Q140 0 154 0 H316 Q330 0 330 14 V34 Q330 48 316 48 H154 Q140 48 140 34 Z" fill="#7fa9c9" />
      <circle cx="344" cy="32" r="16" fill="#afc4b2" />
      <rect x="156" y="16" width="120" height="6" rx="3" fill="#ffffff" opacity="0.9" />
      <rect x="156" y="28" width="80" height="6" rx="3" fill="#ffffff" opacity="0.7" />
    </g>
    
    <!-- Progress Bar (Time remaining) -->
    <rect x="220" y="320" width="320" height="4" rx="2" fill="#edeeef" />
    <rect x="220" y="320" width="100" height="4" rx="2" fill="#7fa9c9" />
  </g>
</svg>
