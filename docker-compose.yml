services:
  server:
    build:
      context: ./Server
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - ./Server:/app
    environment:
      - GIN_MODE=debug
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=apu2026
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=apu2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apu2026"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    